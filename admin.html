<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Editar Post | Professor Vine</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .admin-container {
            max-width: 800px;
            margin: 40px auto;
            padding: 40px;
            background: var(--bg-secondary);
            border-radius: 12px;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border-color);
        }
        .editor-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        .editor-header h2 {
            font-family: var(--font-primary);
            color: var(--primary-color);
            margin: 0;
        }
        .editor-toolbar {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .toolbar-btn {
            padding: 8px 16px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            transition: var(--transition);
        }
        .toolbar-btn:hover {
            background: var(--primary-light);
            transform: translateY(-2px);
        }
        .toolbar-btn.html-btn {
            background: var(--accent-color);
        }
        .toolbar-btn.html-btn:hover {
            background: var(--accent-light);
        }
        textarea {
            width: 100%;
            height: 450px;
            padding: 20px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: var(--bg-color);
            color: var(--text-color);
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            font-size: 1rem;
            resize: vertical;
            line-height: 1.6;
            transition: var(--transition);
        }
        textarea:focus {
            border-color: var(--primary-color);
            outline: none;
            box-shadow: 0 0 0 3px rgba(30, 58, 95, 0.1);
        }
        .save-btn {
            margin-top: 24px;
            padding: 14px 28px;
            background: #27ae60;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            width: 100%;
            transition: var(--transition);
        }
        .save-btn:hover {
            background: #219150;
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }
    </style>
</head>
<body>
    <button id="theme-toggle" class="theme-toggle" aria-label="Alternar modo escuro">🌙 Modo Escuro</button>

    <div class="container">
        <div class="admin-container">
            <header class="editor-header">
                <h2>Editar Post</h2>
                <a href="index.html" style="text-decoration: none; color: var(--primary-color);">← Voltar</a>
            </header>

            <div class="editor-toolbar">
                <button class="toolbar-btn" onclick="insertTag('b')"><b>B</b></button>
                <button class="toolbar-btn" onclick="insertTag('i')"><i>I</i></button>
                <button class="toolbar-btn" onclick="insertTag('a')">Link</button>
                <button class="toolbar-btn html-btn" id="insert-html-btn"><span>&lt;/&gt;</span> Incluir HTML</button>
            </div>

            <textarea id="post-content" placeholder="Escreva seu post aqui..."></textarea>

            <button class="save-btn" onclick="savePost()">Salvar Publicação</button>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script>
        function insertTag(tag) {
            const textarea = document.getElementById('post-content');
            const start = textarea.selectionStart;
            const end = textarea.selectionEnd;
            const text = textarea.value;
            const selected = text.substring(start, end);
            let replacement = '';

            if (tag === 'a') {
                const url = prompt('Digite a URL:', 'https://');
                if (url) replacement = `<a href="${url}">${selected || 'link'}</a>`;
            } else {
                replacement = `<${tag}>${selected}</${tag}>`;
            }

            if (replacement) {
                textarea.value = text.substring(0, start) + replacement + text.substring(end);
                textarea.focus();
                textarea.setSelectionRange(start + replacement.length, start + replacement.length);
            }
        }

        document.getElementById('insert-html-btn').addEventListener('click', function() {
            const htmlSnippet = prompt('Cole o código HTML aqui:');
            if (htmlSnippet) {
                const textarea = document.getElementById('post-content');
                const start = textarea.selectionStart;
                const end = textarea.selectionEnd;
                const text = textarea.value;
                
                textarea.value = text.substring(0, start) + htmlSnippet + text.substring(end);
                textarea.focus();
                textarea.setSelectionRange(start + htmlSnippet.length, start + htmlSnippet.length);
            }
        });

        function savePost() {
            const content = document.getElementById('post-content').value;
            console.log('Post salvo:', content);
            alert('Funcionalidade de salvamento simulada. Veja o console.');
        }
    </script>
</body>
</html>
