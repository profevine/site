<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" width="600" height="500" style="background-color: #FFFFFF; border: 1px solid #CBD5E0; border-radius: 5px;">
    <!-- Fundo -->
    <rect width="100%" height="100%" fill="#F7FAFC" />
    
    <!-- Desenho do Cano PVC -->
    <rect x="260" y="80" width="40" height="360" fill="#E2E8F0" stroke="#718096" stroke-width="2" />
    <line x1="280" y1="80" x2="280" y2="440" stroke="#CBD5E0" stroke-dasharray="3,3" />
    
    <!-- Motor no Topo -->
    <rect x="240" y="20" width="80" height="50" rx="3" fill="#4A5568" stroke="#2D3748" stroke-width="2" />
    <text x="280" y="40" fill="#FFFFFF" font-family="sans-serif" font-size="8" font-weight="bold" text-anchor="middle">MOTOR NO TOPO</text>
    
    <!-- Eixo e Carretel -->
    <rect x="255" y="70" width="50" height="10" fill="#DD6B20" />
    
    <!-- Linha de Pesca -->
    <line x1="290" y1="75" x2="290" y2="200" stroke="#3182CE" stroke-width="1.5" stroke-dasharray="4,4" />
    <text x="300" y="140" fill="#3182CE" font-family="sans-serif" font-size="8" font-style="italic">Linha de Pesca</text>
    
    <!-- Módulo Lunar Impresso em 3D -->
    <g transform="translate(260, 200)">
        <!-- Anéis de Deslizamento que abraçam o cano de PVC -->
        <rect x="-8" y="5" width="56" height="8" rx="2" fill="none" stroke="#E53E3E" stroke-width="2" />
        <rect x="-8" y="65" width="56" height="8" rx="2" fill="none" stroke="#E53E3E" stroke-width="2" />
        <text x="55" y="12" fill="#E53E3E" font-family="sans-serif" font-size="8" font-weight="bold">Anéis de Guia (Filtro)</text>

        <!-- Corpo do Módulo -->
        <polygon points="10,0 30,0 35,20 35,50 5,50 5,20" fill="#A0AEC0" stroke="#4A5568" stroke-width="2" />
        <!-- Janela -->
        <rect x="15" y="10" width="10" height="10" fill="#BEE3F8" stroke="#4A5568" stroke-width="1" />
        <!-- Pés de Pouso -->
        <line x1="5" y1="50" x2="-5" y2="75" stroke="#4A5568" stroke-width="2" />
        <line x1="35" y1="50" x2="45" y2="75" stroke="#4A5568" stroke-width="2" />
        <circle cx="-5" cy="75" r="4" fill="#E2E8F0" stroke="#4A5568" />
        <circle cx="45" cy="75" r="4" fill="#E2E8F0" stroke="#4A5568" />
        <!-- Bocal do Propulsor e LED -->
        <polygon points="15,50 25,50 28,60 12,60" fill="#E53E3E" />
        <circle cx="20" cy="62" r="5" fill="#ED8936" />
        
        <text x="55" y="40" fill="#4A5568" font-family="sans-serif" font-size="9" font-weight="bold">Módulo Lunar 3D</text>
    </g>

    <!-- Base de Apoio / Plataforma de Pouso -->
    <rect x="160" y="440" width="240" height="15" fill="#718096" stroke="#4A5568" stroke-width="2" rx="2" />
    <text x="280" y="452" fill="#FFFFFF" font-family="sans-serif" font-size="9" font-weight="bold" text-anchor="middle">PLATAFORMA DE POUSO (CHÃO)</text>
    
    <!-- Legendas de Estrutura -->
    <text x="310" y="320" fill="#718096" font-family="sans-serif" font-size="9">Cano de PVC (Trilho)</text>
    
    <!-- Fios suspensos flexíveis do LED -->
    <path d="M 225,260 Q 180,200 180,100" fill="none" stroke="#E53E3E" stroke-dasharray="2" stroke-width="1.5" />
    <path d="M 220,260 Q 170,200 170,100" fill="none" stroke="#2D3748" stroke-dasharray="2" stroke-width="1.5" />
    <text x="140" y="180" fill="#E53E3E" font-family="sans-serif" font-size="8" font-weight="bold">Fios Finos do LED</text>
</svg>
