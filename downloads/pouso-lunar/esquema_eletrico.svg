<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" width="800" height="480" style="background-color: #FFFFFF; border: 1px solid #CBD5E0; border-radius: 5px;">
    <!-- Fundo do SVG -->
    <rect width="100%" height="100%" fill="#F7FAFC" />
    
    <!-- Grid de fundo sutil -->
    <path d="M 0,50 L 800,50 M 0,100 L 800,100 M 0,150 L 800,150 M 0,200 L 800,200 M 0,250 L 800,250 M 0,300 L 800,300 M 0,350 L 800,350 M 0,400 L 800,400" stroke="#EDF2F7" stroke-width="1"/>
    <path d="M 100,0 L 100,480 M 200,0 L 200,480 M 300,0 L 300,480 M 400,0 L 400,480 M 500,0 L 500,480 M 600,0 L 600,480 M 700,0 L 700,480" stroke="#EDF2F7" stroke-width="1"/>

    <!-- PLACA ARDUINO UNO -->
    <rect x="50" y="60" width="220" height="300" rx="10" fill="#1A365D" stroke="#2B6CB0" stroke-width="3" />
    <text x="160" y="90" fill="#FFFFFF" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">ARDUINO UNO R3</text>
    
    <!-- Pinos Digitais do Arduino -->
    <g font-family="monospace" font-size="9" fill="#E2E8F0">
        <!-- Barra superior de pinos digitais -->
        <rect x="65" y="340" width="190" height="15" fill="#2D3748" rx="2" />
        <text x="80" y="352" text-anchor="middle">D2</text>
        <circle id="pin-d2" cx="80" cy="347" r="3" fill="#E53E3E" />
        
        <text x="110" y="352" text-anchor="middle">D6</text>
        <circle id="pin-d6" cx="110" cy="347" r="3" fill="#ED8936" />
        
        <text x="140" y="352" text-anchor="middle">D7</text>
        <circle id="pin-d7" cx="140" cy="347" r="3" fill="#ECC94B" />
        
        <text x="170" y="352" text-anchor="middle">D8</text>
        <circle id="pin-d8" cx="170" cy="347" r="3" fill="#48BB78" />
        
        <text x="190" y="352" text-anchor="middle">D9</text>
        <circle id="pin-d9" cx="190" cy="347" r="3" fill="#4299E1" />
        
        <text x="210" y="352" text-anchor="middle">D10</text>
        <circle id="pin-d10" cx="210" cy="347" r="3" fill="#38B2AC" />
        
        <text x="235" y="352" text-anchor="middle">D11</text>
        <circle id="pin-d11" cx="235" cy="347" r="3" fill="#9F7AEA" />

        <!-- Pinos de Energia (GND) -->
        <rect x="65" y="70" width="80" height="15" fill="#2D3748" rx="2" />
        <text x="105" y="81" text-anchor="middle">GND</text>
        <circle id="pin-gnd" cx="80" cy="77" r="3" fill="#A0AEC0" />
    </g>

    <!-- DRIVER ULN2003 -->
    <rect x="420" y="60" width="160" height="200" rx="8" fill="#22543D" stroke="#38A169" stroke-width="3" />
    <text x="500" y="85" fill="#FFFFFF" font-family="sans-serif" font-size="11" font-weight="bold" text-anchor="middle">DRIVER ULN2003</text>
    
    <!-- Entradas IN1 - IN4 do Driver -->
    <g font-family="monospace" font-size="9" fill="#E2E8F0">
        <rect x="430" y="110" width="40" height="80" fill="#2D3748" rx="2" />
        <text x="450" y="125" text-anchor="middle">IN1</text>
        <circle id="drv-in1" cx="465" cy="122" r="3" fill="#48BB78" />
        <text x="450" y="142" text-anchor="middle">IN2</text>
        <circle id="drv-in2" cx="465" cy="139" r="3" fill="#4299E1" />
        <text x="450" y="159" text-anchor="middle">IN3</text>
        <circle id="drv-in3" cx="465" cy="156" r="3" fill="#38B2AC" />
        <text x="450" y="176" text-anchor="middle">IN4</text>
        <circle id="drv-in4" cx="465" cy="173" r="3" fill="#9F7AEA" />
        
        <!-- Alimentação Driver -->
        <rect x="520" y="210" width="50" height="40" fill="#2D3748" rx="2" />
        <text x="545" y="225" text-anchor="middle" fill="#E53E3E" font-weight="bold">VCC (+)</text>
        <circle id="drv-vcc" cx="530" cy="222" r="3" fill="#E53E3E" />
        <text x="545" y="242" text-anchor="middle" fill="#A0AEC0">GND (-)</text>
        <circle id="drv-gnd" cx="530" cy="239" r="3" fill="#A0AEC0" />
    </g>

    <!-- CONEXÕES DE FIOS DO MOTOR (Arduino -> Driver) -->
    <!-- D8 -> IN1 (Verde) -->
    <path d="M 170,347 L 170,390 L 390,390 L 390,122 L 465,122" fill="none" stroke="#48BB78" stroke-width="2.5" />
    <!-- D10 -> IN2 (Ciano) -->
    <path d="M 210,347 L 210,380 L 380,380 L 380,139 L 465,139" fill="none" stroke="#4299E1" stroke-width="2" />
    <!-- D9 -> IN3 (Azul) -->
    <path d="M 190,347 L 190,370 L 370,370 L 370,156 L 465,156" fill="none" stroke="#38B2AC" stroke-width="2" />
    <!-- D11 -> IN4 (Roxo) -->
    <path d="M 235,347 L 235,360 L 360,360 L 360,173 L 465,173" fill="none" stroke="#9F7AEA" stroke-width="2" />

    <!-- BOTÃO DE ARCADE (PROPULSOR) -->
    <rect x="50" y="400" width="80" height="60" rx="5" fill="#E53E3E" stroke="#9B2C2C" stroke-width="2" />
    <circle cx="90" cy="430" r="18" fill="#FFF5F5" stroke="#E53E3E" stroke-width="3" />
    <text x="90" y="415" fill="#FFFFFF" font-family="sans-serif" font-size="8" font-weight="bold" text-anchor="middle">BOTÃO</text>
    <circle id="btn-t1" cx="80" cy="445" r="3" fill="#718096" />
    <circle id="btn-t2" cx="100" cy="445" r="3" fill="#718096" />
    
    <!-- Conexões do Botão -->
    <!-- D2 -> Botão T1 (Vermelho) -->
    <path d="M 80,347 L 80,445" fill="none" stroke="#E53E3E" stroke-width="2" />
    <!-- Botão T2 -> GND do Arduino (Preto) -->
    <path d="M 100,445 L 100,470 L 40,470 L 40,77 L 80,77" fill="none" stroke="#2D3748" stroke-dasharray="2" stroke-width="2" />

    <!-- LED LUMINOSO (MÓDULO LUNAR) -->
    <rect x="180" y="400" width="80" height="60" rx="5" fill="#D69E2E" stroke="#975A16" stroke-width="2" />
    <text x="220" y="415" fill="#FFFFFF" font-family="sans-serif" font-size="8" font-weight="bold" text-anchor="middle">LED FOGO</text>
    <!-- Símbolo do LED -->
    <path d="M 210,430 L 230,430 M 220,420 L 220,440 M 210,425 L 210,435" stroke="#FFFFFF" stroke-width="2"/>
    <circle id="led-anode" cx="205" cy="445" r="3" fill="#718096" />
    <circle id="led-cathode" cx="235" cy="445" r="3" fill="#718096" />
    <!-- Resistor em Série de 220 Ohms -->
    <rect x="195" y="380" width="20" height="8" fill="#ECC94B" stroke="#718096" stroke-width="1"/>
    <line x1="195" y1="384" x2="185" y2="384" stroke="#718096" stroke-width="1.5"/>
    <line x1="215" y1="384" x2="225" y2="384" stroke="#718096" stroke-width="1.5"/>

    <!-- Conexões do LED -->
    <!-- D7 -> Resistor -> Anodo do LED (Laranja) -->
    <path d="M 140,347 L 140,384 L 185,384" fill="none" stroke="#DD6B20" stroke-width="2" />
    <path d="M 225,384 L 225,395 L 205,395 L 205,445" fill="none" stroke="#DD6B20" stroke-width="2" />
    <!-- Catodo -> GND (Preto) -->
    <path d="M 235,445 L 235,470 L 40,470" fill="none" stroke="#2D3748" stroke-width="2" />

    <!-- BUZZER SONORO -->
    <rect x="300" y="400" width="80" height="60" rx="5" fill="#4A5568" stroke="#2D3748" stroke-width="2" />
    <text x="340" y="415" fill="#FFFFFF" font-family="sans-serif" font-size="8" font-weight="bold" text-anchor="middle">BUZZER</text>
    <circle cx="340" cy="435" r="10" fill="#2D3748" />
    <circle id="buz-pos" cx="325" cy="445" r="3" fill="#718096" />
    <circle id="buz-neg" cx="355" cy="445" r="3" fill="#718096" />

    <!-- Conexões do Buzzer -->
    <!-- D6 -> Buzzer Positivo (Laranja escuro) -->
    <path d="M 110,347 L 110,395 L 325,395 L 325,445" fill="none" stroke="#C05621" stroke-width="2" />
    <!-- Buzzer Negativo -> GND (Preto) -->
    <path d="M 355,445 L 355,470 L 235,470" fill="none" stroke="#2D3748" stroke-width="2" />

    <!-- FONTE EXTERNA 5V (Bateria) -->
    <rect x="630" y="270" width="130" height="90" rx="6" fill="#2D3748" stroke="#1A202C" stroke-width="2" />
    <text x="695" y="295" fill="#FFFFFF" font-family="sans-serif" font-size="10" font-weight="bold" text-anchor="middle">FONTE EXT. 5V</text>
    <circle id="pwr-pos" cx="660" cy="335" r="4" fill="#E53E3E" />
    <text x="660" y="325" fill="#E53E3E" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">+</text>
    
    <circle id="pwr-neg" cx="730" cy="335" r="4" fill="#A0AEC0" />
    <text x="730" y="325" fill="#A0AEC0" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">-</text>

    <!-- Conexões da Fonte ao Driver -->
    <!-- Positivo -> VCC Driver (Vermelho) -->
    <path d="M 660,335 L 660,380 L 510,380 L 510,222 L 530,222" fill="none" stroke="#E53E3E" stroke-width="2.5" />
    <!-- Negativo -> GND Driver (Preto) -->
    <path d="M 730,335 L 730,390 L 500,390 L 500,239 L 530,239" fill="none" stroke="#2D3748" stroke-width="2.5" />
    
    <!-- Conexão GND Comum (Driver GND -> Arduino GND) -->
    <path d="M 500,390 L 500,470 L 40,470" fill="none" stroke="#000000" stroke-width="2" stroke-dasharray="4,4" />
    
    <!-- Fio de Conexão do Motor de Passo (Representação) -->
    <path d="M 580,160 Q 640,160 640,120" fill="none" stroke="#E2E8F0" stroke-width="8" stroke-linecap="round"/>
    <rect x="635" y="70" width="110" height="90" rx="30" fill="#A0AEC0" stroke="#718096" stroke-width="2" />
    <circle cx="690" cy="115" r="25" fill="#718096" />
    <circle cx="690" cy="115" r="10" fill="#E2E8F0" />
    <text x="690" y="150" fill="#2D3748" font-family="sans-serif" font-size="8" font-weight="bold" text-anchor="middle">MOTOR 28BYJ</text>
</svg>
