<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" width="900" height="560" style="background-color:#FFFFFF; border:1px solid #CBD5E0; border-radius:5px;">

    <!-- Fundo -->
    <rect width="100%" height="100%" fill="#F7FAFC"/>

    <!-- Grid sutil -->
    <path d="M 0,50 L 900,50 M 0,100 L 900,100 M 0,150 L 900,150 M 0,200 L 900,200 M 0,250 L 900,250 M 0,300 L 900,300 M 0,350 L 900,350 M 0,400 L 900,400 M 0,450 L 900,450 M 0,500 L 900,500" stroke="#EDF2F7" stroke-width="1"/>
    <path d="M 100,0 L 100,560 M 200,0 L 200,560 M 300,0 L 300,560 M 400,0 L 400,560 M 500,0 L 500,560 M 600,0 L 600,560 M 700,0 L 700,560 M 800,0 L 800,560" stroke="#EDF2F7" stroke-width="1"/>

    <!-- ====================================================
         ARDUINO UNO R3
    ==================================================== -->
    <rect x="50" y="60" width="220" height="300" rx="10" fill="#1A365D" stroke="#2B6CB0" stroke-width="3"/>
    <text x="160" y="90" fill="#FFFFFF" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">ARDUINO UNO R3</text>

    <!-- Pinos digitais -->
    <g font-family="monospace" font-size="9" fill="#E2E8F0">
        <rect x="65" y="340" width="190" height="15" fill="#2D3748" rx="2"/>
        <text x="80"  y="352" text-anchor="middle">D2</text>
        <circle id="pin-d2"  cx="80"  cy="347" r="3" fill="#E53E3E"/>
        <text x="110" y="352" text-anchor="middle">D6</text>
        <circle id="pin-d6"  cx="110" cy="347" r="3" fill="#ED8936"/>
        <text x="140" y="352" text-anchor="middle">D7</text>
        <circle id="pin-d7"  cx="140" cy="347" r="3" fill="#ECC94B"/>
        <text x="170" y="352" text-anchor="middle">D8</text>
        <circle id="pin-d8"  cx="170" cy="347" r="3" fill="#48BB78"/>
        <text x="190" y="352" text-anchor="middle">D9</text>
        <circle id="pin-d9"  cx="190" cy="347" r="3" fill="#4299E1"/>
        <text x="210" y="352" text-anchor="middle">D10</text>
        <circle id="pin-d10" cx="210" cy="347" r="3" fill="#38B2AC"/>
        <text x="235" y="352" text-anchor="middle">D11</text>
        <circle id="pin-d11" cx="235" cy="347" r="3" fill="#9F7AEA"/>

        <!-- GND -->
        <rect x="65" y="70" width="80" height="15" fill="#2D3748" rx="2"/>
        <text x="105" y="81" text-anchor="middle">GND</text>
        <circle id="pin-gnd" cx="80" cy="77" r="3" fill="#A0AEC0"/>
    </g>

    <!-- ====================================================
         DRIVER ULN2003
    ==================================================== -->
    <rect x="420" y="60" width="160" height="220" rx="8" fill="#22543D" stroke="#38A169" stroke-width="3"/>
    <text x="500" y="85" fill="#FFFFFF" font-family="sans-serif" font-size="11" font-weight="bold" text-anchor="middle">DRIVER ULN2003</text>

    <!-- Entradas IN1-IN4 (lado esquerdo — Arduino) -->
    <g font-family="monospace" font-size="9" fill="#E2E8F0">
        <rect x="430" y="110" width="40" height="80" fill="#2D3748" rx="2"/>
        <text x="450" y="125" text-anchor="middle">IN1</text>
        <circle id="drv-in1" cx="465" cy="122" r="3" fill="#48BB78"/>
        <text x="450" y="142" text-anchor="middle">IN2</text>
        <circle id="drv-in2" cx="465" cy="139" r="3" fill="#4299E1"/>
        <text x="450" y="159" text-anchor="middle">IN3</text>
        <circle id="drv-in3" cx="465" cy="156" r="3" fill="#38B2AC"/>
        <text x="450" y="176" text-anchor="middle">IN4</text>
        <circle id="drv-in4" cx="465" cy="173" r="3" fill="#9F7AEA"/>

        <!-- Saídas OUT1-OUT4 (lado direito — Motor) -->
        <rect x="510" y="110" width="40" height="80" fill="#2D3748" rx="2"/>
        <text x="530" y="125" text-anchor="middle">OUT1</text>
        <circle id="drv-out1" cx="515" cy="122" r="3" fill="#FF8C00"/>
        <text x="530" y="142" text-anchor="middle">OUT2</text>
        <circle id="drv-out2" cx="515" cy="139" r="3" fill="#F6E05E"/>
        <text x="530" y="159" text-anchor="middle">OUT3</text>
        <circle id="drv-out3" cx="515" cy="156" r="3" fill="#F472B6"/>
        <text x="530" y="176" text-anchor="middle">OUT4</text>
        <circle id="drv-out4" cx="515" cy="173" r="3" fill="#60A5FA"/>

        <!-- Alimentação Driver -->
        <rect x="430" y="215" width="50" height="40" fill="#2D3748" rx="2"/>
        <text x="455" y="230" text-anchor="middle" fill="#E53E3E" font-weight="bold">VCC (+)</text>
        <circle id="drv-vcc" cx="440" cy="227" r="3" fill="#E53E3E"/>
        <text x="455" y="247" text-anchor="middle" fill="#A0AEC0">GND (-)</text>
        <circle id="drv-gnd" cx="440" cy="244" r="3" fill="#A0AEC0"/>
    </g>

    <!-- ====================================================
         MOTOR 28BYJ-48
    ==================================================== -->
    <rect x="660" y="60" width="130" height="120" rx="30" fill="#A0AEC0" stroke="#718096" stroke-width="2"/>
    <circle cx="725" cy="120" r="35" fill="#718096"/>
    <circle cx="725" cy="120" r="14" fill="#E2E8F0"/>
    <text x="725" y="175" fill="#2D3748" font-family="sans-serif" font-size="9" font-weight="bold" text-anchor="middle">MOTOR 28BYJ-48</text>

    <!-- Conector JST do motor (5 pinos na lateral esquerda) -->
    <rect x="655" y="90" width="12" height="60" rx="2" fill="#2D3748"/>
    <!-- pino vermelho (VCC) -->
    <circle cx="661" cy="98"  r="3" fill="#E53E3E"/>
    <!-- pino laranja (OUT1/Bobina A) -->
    <circle cx="661" cy="110" r="3" fill="#FF8C00"/>
    <!-- pino amarelo (OUT2/Bobina B) -->
    <circle cx="661" cy="122" r="3" fill="#F6E05E" stroke="#ccc" stroke-width="0.5"/>
    <!-- pino rosa (OUT3/Bobina C) -->
    <circle cx="661" cy="134" r="3" fill="#F472B6"/>
    <!-- pino azul (OUT4/Bobina D) -->
    <circle cx="661" cy="146" r="3" fill="#60A5FA"/>

    <!-- ====================================================
         FIOS MOTOR: Driver OUT -> Motor (5 fios coloridos)
    ==================================================== -->
    <!-- VCC (vermelho) — pino central do JST — vai ao VCC do driver -->
    <path d="M 515,105 Q 590,80 661,98" fill="none" stroke="#E53E3E" stroke-width="2" stroke-dasharray="5,3"/>

    <!-- OUT1 -> Laranja (Bobina A) -->
    <path d="M 515,122 L 580,122 L 580,110 L 661,110" fill="none" stroke="#FF8C00" stroke-width="2"/>
    <!-- OUT2 -> Amarelo (Bobina B) -->
    <path d="M 515,139 L 590,139 L 590,122 L 661,122" fill="none" stroke="#F6E05E" stroke-width="2"/>
    <!-- OUT3 -> Rosa (Bobina C) -->
    <path d="M 515,156 L 600,156 L 600,134 L 661,134" fill="none" stroke="#F472B6" stroke-width="2"/>
    <!-- OUT4 -> Azul (Bobina D) -->
    <path d="M 515,173 L 610,173 L 610,146 L 661,146" fill="none" stroke="#60A5FA" stroke-width="2"/>

    <!-- ====================================================
         LEGENDA / TABELA DOS FIOS DO MOTOR
    ==================================================== -->
    <!-- Caixa da legenda -->
    <rect x="630" y="200" width="250" height="185" rx="7" fill="#1A202C" stroke="#4A5568" stroke-width="1.5"/>
    <text x="755" y="220" fill="#FFFFFF" font-family="sans-serif" font-size="10" font-weight="bold" text-anchor="middle">FIOS DO MOTOR 28BYJ-48</text>
    <line x1="640" y1="225" x2="870" y2="225" stroke="#4A5568" stroke-width="1"/>

    <!-- Cabeçalho da tabela -->
    <rect x="638" y="228" width="234" height="16" fill="#2D3748" rx="2"/>
    <text x="660" y="240" fill="#A0AEC0" font-family="sans-serif" font-size="8" font-weight="bold">COR DO FIO</text>
    <text x="730" y="240" fill="#A0AEC0" font-family="sans-serif" font-size="8" font-weight="bold">FUNÇÃO</text>
    <text x="810" y="240" fill="#A0AEC0" font-family="sans-serif" font-size="8" font-weight="bold">PINO DRIVER</text>

    <!-- Linha 1: Vermelho = VCC -->
    <rect x="638" y="244" width="234" height="26" fill="#1A202C"/>
    <circle cx="653" cy="257" r="6" fill="#E53E3E"/>
    <text x="665" y="261" fill="#FFFFFF" font-family="monospace" font-size="9">Vermelho</text>
    <text x="730" y="261" fill="#E2E8F0" font-family="sans-serif" font-size="8.5">VCC (5V centro)</text>
    <text x="815" y="261" fill="#E53E3E" font-family="monospace" font-size="9" font-weight="bold">VCC (+)</text>

    <!-- Linha 2: Laranja = OUT1 / Bobina A -->
    <rect x="638" y="270" width="234" height="26" fill="#2D3748"/>
    <circle cx="653" cy="283" r="6" fill="#FF8C00"/>
    <text x="665" y="287" fill="#FFFFFF" font-family="monospace" font-size="9">Laranja</text>
    <text x="730" y="287" fill="#E2E8F0" font-family="sans-serif" font-size="8.5">Bobina A (IN1)</text>
    <text x="815" y="287" fill="#48BB78" font-family="monospace" font-size="9" font-weight="bold">OUT1 → IN1</text>

    <!-- Linha 3: Amarelo = OUT2 / Bobina B -->
    <rect x="638" y="296" width="234" height="26" fill="#1A202C"/>
    <circle cx="653" cy="309" r="6" fill="#F6E05E" stroke="#ccc" stroke-width="0.5"/>
    <text x="665" y="313" fill="#FFFFFF" font-family="monospace" font-size="9">Amarelo</text>
    <text x="730" y="313" fill="#E2E8F0" font-family="sans-serif" font-size="8.5">Bobina B (IN2)</text>
    <text x="815" y="313" fill="#4299E1" font-family="monospace" font-size="9" font-weight="bold">OUT2 → IN2</text>

    <!-- Linha 4: Rosa = OUT3 / Bobina C -->
    <rect x="638" y="322" width="234" height="26" fill="#2D3748"/>
    <circle cx="653" cy="335" r="6" fill="#F472B6"/>
    <text x="665" y="339" fill="#FFFFFF" font-family="monospace" font-size="9">Rosa</text>
    <text x="730" y="339" fill="#E2E8F0" font-family="sans-serif" font-size="8.5">Bobina C (IN3)</text>
    <text x="815" y="339" fill="#38B2AC" font-family="monospace" font-size="9" font-weight="bold">OUT3 → IN3</text>

    <!-- Linha 5: Azul = OUT4 / Bobina D -->
    <rect x="638" y="348" width="234" height="26" fill="#1A202C"/>
    <circle cx="653" cy="361" r="6" fill="#60A5FA"/>
    <text x="665" y="365" fill="#FFFFFF" font-family="monospace" font-size="9">Azul</text>
    <text x="730" y="365" fill="#E2E8F0" font-family="sans-serif" font-size="8.5">Bobina D (IN4)</text>
    <text x="815" y="365" fill="#9F7AEA" font-family="monospace" font-size="9" font-weight="bold">OUT4 → IN4</text>

    <!-- Nota de rodapé da legenda -->
    <line x1="640" y1="374" x2="870" y2="374" stroke="#4A5568" stroke-width="1"/>
    <text x="755" y="385" fill="#718096" font-family="sans-serif" font-size="7.5" text-anchor="middle">Conector JST de 5 vias plugado diretamente no driver.</text>

    <!-- ====================================================
         CONEXÕES: Arduino -> Driver (fios de controle)
    ==================================================== -->
    <!-- D8 -> IN1 (Verde) -->
    <path d="M 170,347 L 170,410 L 400,410 L 400,122 L 465,122" fill="none" stroke="#48BB78" stroke-width="2.5"/>
    <!-- D10 -> IN2 (Ciano) -->
    <path d="M 210,347 L 210,420 L 408,420 L 408,139 L 465,139" fill="none" stroke="#4299E1" stroke-width="2"/>
    <!-- D9 -> IN3 (Azul-escuro) -->
    <path d="M 190,347 L 190,430 L 416,430 L 416,156 L 465,156" fill="none" stroke="#38B2AC" stroke-width="2"/>
    <!-- D11 -> IN4 (Roxo) -->
    <path d="M 235,347 L 235,440 L 424,440 L 424,173 L 465,173" fill="none" stroke="#9F7AEA" stroke-width="2"/>

    <!-- Labels dos fios de controle -->
    <text x="290" y="407" fill="#48BB78" font-family="monospace" font-size="7.5" font-weight="bold">D8→IN1</text>
    <text x="290" y="418" fill="#4299E1" font-family="monospace" font-size="7.5" font-weight="bold">D10→IN2</text>
    <text x="290" y="429" fill="#38B2AC" font-family="monospace" font-size="7.5" font-weight="bold">D9→IN3</text>
    <text x="290" y="440" fill="#9F7AEA" font-family="monospace" font-size="7.5" font-weight="bold">D11→IN4</text>

    <!-- ====================================================
         BOTÃO DE ARCADE
    ==================================================== -->
    <rect x="50" y="470" width="80" height="60" rx="5" fill="#E53E3E" stroke="#9B2C2C" stroke-width="2"/>
    <circle cx="90" cy="500" r="18" fill="#FFF5F5" stroke="#E53E3E" stroke-width="3"/>
    <text x="90" y="483" fill="#FFFFFF" font-family="sans-serif" font-size="8" font-weight="bold" text-anchor="middle">BOTÃO</text>
    <circle id="btn-t1" cx="80"  cy="515" r="3" fill="#718096"/>
    <circle id="btn-t2" cx="100" cy="515" r="3" fill="#718096"/>

    <!-- D2 -> Botão T1 -->
    <path d="M 80,347 L 80,515" fill="none" stroke="#E53E3E" stroke-width="2"/>
    <!-- Botão T2 -> GND -->
    <path d="M 100,515 L 100,540 L 40,540 L 40,77 L 80,77" fill="none" stroke="#2D3748" stroke-dasharray="3" stroke-width="2"/>

    <!-- ====================================================
         LED FOGO
    ==================================================== -->
    <rect x="180" y="470" width="80" height="60" rx="5" fill="#D69E2E" stroke="#975A16" stroke-width="2"/>
    <text x="220" y="485" fill="#FFFFFF" font-family="sans-serif" font-size="8" font-weight="bold" text-anchor="middle">LED FOGO</text>
    <path d="M 210,500 L 230,500 M 220,490 L 220,510 M 210,495 L 210,505" stroke="#FFFFFF" stroke-width="2"/>
    <circle id="led-anode"   cx="205" cy="515" r="3" fill="#718096"/>
    <circle id="led-cathode" cx="235" cy="515" r="3" fill="#718096"/>
    <!-- Resistor 220Ω -->
    <rect x="195" y="452" width="20" height="8" fill="#ECC94B" stroke="#718096" stroke-width="1"/>
    <line x1="195" y1="456" x2="185" y2="456" stroke="#718096" stroke-width="1.5"/>
    <line x1="215" y1="456" x2="225" y2="456" stroke="#718096" stroke-width="1.5"/>
    <text x="208" y="448" fill="#718096" font-family="sans-serif" font-size="7" text-anchor="middle">220Ω</text>

    <!-- D7 -> Resistor -> LED Anodo -->
    <path d="M 140,347 L 140,456 L 185,456" fill="none" stroke="#DD6B20" stroke-width="2"/>
    <path d="M 225,456 L 225,467 L 205,467 L 205,515" fill="none" stroke="#DD6B20" stroke-width="2"/>
    <!-- LED Catodo -> GND -->
    <path d="M 235,515 L 235,540 L 40,540" fill="none" stroke="#2D3748" stroke-width="2"/>

    <!-- ====================================================
         BUZZER
    ==================================================== -->
    <rect x="300" y="470" width="80" height="60" rx="5" fill="#4A5568" stroke="#2D3748" stroke-width="2"/>
    <text x="340" y="485" fill="#FFFFFF" font-family="sans-serif" font-size="8" font-weight="bold" text-anchor="middle">BUZZER</text>
    <circle cx="340" cy="505" r="10" fill="#2D3748"/>
    <circle id="buz-pos" cx="325" cy="515" r="3" fill="#718096"/>
    <circle id="buz-neg" cx="355" cy="515" r="3" fill="#718096"/>

    <!-- D6 -> Buzzer + -->
    <path d="M 110,347 L 110,465 L 325,465 L 325,515" fill="none" stroke="#C05621" stroke-width="2"/>
    <!-- Buzzer - -> GND -->
    <path d="M 355,515 L 355,540 L 235,540" fill="none" stroke="#2D3748" stroke-width="2"/>

    <!-- ====================================================
         FONTE EXTERNA 5V
    ==================================================== -->
    <rect x="630" y="410" width="130" height="90" rx="6" fill="#2D3748" stroke="#1A202C" stroke-width="2"/>
    <text x="695" y="433" fill="#FFFFFF" font-family="sans-serif" font-size="10" font-weight="bold" text-anchor="middle">FONTE EXT. 5V</text>
    <circle id="pwr-pos" cx="660" cy="470" r="4" fill="#E53E3E"/>
    <text x="660" y="460" fill="#E53E3E" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">+</text>
    <circle id="pwr-neg" cx="730" cy="470" r="4" fill="#A0AEC0"/>
    <text x="730" y="460" fill="#A0AEC0" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">-</text>

    <!-- Fonte VCC -> Driver VCC -->
    <path d="M 660,470 L 660,510 L 610,510 L 610,395 L 440,395 L 440,255" fill="none" stroke="#E53E3E" stroke-width="2.5"/>
    <!-- Fonte GND -> Driver GND -->
    <path d="M 730,470 L 730,520 L 600,520 L 600,400 L 435,400 L 435,272" fill="none" stroke="#2D3748" stroke-width="2.5"/>

    <!-- GND Comum: Driver GND -> Arduino GND (linha tracejada) -->
    <path d="M 435,400 L 435,540 L 40,540" fill="none" stroke="#000000" stroke-width="2" stroke-dasharray="5,4"/>
    <text x="240" y="534" fill="#718096" font-family="sans-serif" font-size="7.5">GND Comum (Arduino + Fonte)</text>

</svg>
